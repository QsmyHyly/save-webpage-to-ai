<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>DeepSeek 页面管理器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 420px;
      min-height: 300px;
      max-height: 600px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f5f7fa;
      overflow-y: auto;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 16px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .header-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .btn-primary {
      background: rgba(255,255,255,0.9);
      color: #667eea;
    }

    .btn-primary:hover {
      background: white;
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.2);
      color: white;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.3);
    }

    .btn-danger {
      background: #dc3545;
      color: white;
    }

    .btn-danger:hover {
      background: #c82333;
    }

    .btn-success {
      background: #28a745;
      color: white;
    }

    .btn-success:hover:not(:disabled) {
      background: #218838;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .content {
      padding: 12px;
    }

    .status-bar {
      background: white;
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 13px;
      color: #666;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-bar .indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #dc3545;
    }

    .status-bar .indicator.active {
      background: #28a745;
    }

    .page-list {
      background: white;
      border-radius: 8px;
      overflow: hidden;
    }

    .page-item {
      padding: 12px;
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      transition: background 0.2s;
    }

    .page-item:hover {
      background: #f8f9fa;
    }

    .page-item:last-child {
      border-bottom: none;
    }

    .page-checkbox {
      margin-top: 2px;
      cursor: pointer;
    }

    .page-info {
      flex: 1;
      min-width: 0;
    }

    .page-title {
      font-size: 13px;
      font-weight: 500;
      color: #333;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .page-url {
      font-size: 11px;
      color: #888;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .page-time {
      font-size: 11px;
      color: #aaa;
      margin-top: 4px;
    }

    .page-actions {
      display: flex;
      gap: 6px;
    }

    .page-actions .btn {
      padding: 4px 8px;
      font-size: 11px;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #999;
    }

    .empty-state svg {
      width: 48px;
      height: 48px;
      margin-bottom: 12px;
      opacity: 0.5;
    }

    .empty-state p {
      font-size: 13px;
    }

    .footer-actions {
      position: sticky;
      bottom: 0;
      background: white;
      padding: 12px;
      border-top: 1px solid #eee;
      display: flex;
      gap: 8px;
      justify-content: space-between;
    }

    .footer-actions .left,
    .footer-actions .right {
      display: flex;
      gap: 8px;
    }

    .progress-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .progress-overlay.active {
      display: flex;
    }

    .progress-box {
      background: white;
      padding: 24px;
      border-radius: 12px;
      text-align: center;
      min-width: 280px;
    }

    .progress-box h3 {
      font-size: 16px;
      margin-bottom: 16px;
      color: #333;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: #eee;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      transition: width 0.3s;
      width: 0%;
    }

    .progress-text {
      font-size: 13px;
      color: #666;
    }

    .size-badge {
      display: inline-block;
      padding: 2px 6px;
      background: #e9ecef;
      border-radius: 4px;
      font-size: 10px;
      color: #666;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>📄 DeepSeek 页面管理器</h1>
    <div class="header-actions">
      <button id="saveCurrentBtn" class="btn btn-primary">💾 保存当前页面</button>
      <button id="selectAllBtn" class="btn btn-secondary">全选</button>
      <button id="deselectAllBtn" class="btn btn-secondary">取消全选</button>
    </div>
  </div>

  <div class="content">
    <div class="status-bar">
      <span id="statusIndicator" class="indicator"></span>
      <span id="statusText">未在 DeepSeek 页面</span>
    </div>

    <div id="pageList" class="page-list">
      <!-- 页面列表将在这里动态生成 -->
    </div>
  </div>

  <div class="footer-actions">
    <div class="left">
      <button id="deleteSelectedBtn" class="btn btn-danger">🗑️ 删除选中</button>
    </div>
    <div class="right">
      <button id="uploadSelectedBtn" class="btn btn-success" disabled>
        📤 上传到 DeepSeek
      </button>
    </div>
  </div>

  <div id="progressOverlay" class="progress-overlay">
    <div class="progress-box">
      <h3>正在上传...</h3>
      <div class="progress-bar">
        <div id="progressFill" class="progress-fill"></div>
      </div>
      <div id="progressText" class="progress-text">准备中...</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
