<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>保存网页并发送给deepseek或千问</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
      <h1>📄 保存网页并发送给deepseek或千问</h1>
    </div>
    <div class="header-actions">
      <button id="saveCurrentBtn" class="btn btn-primary">💾 保存当前页面</button>
      <button id="saveHtmlBtn" class="btn btn-secondary">📄 只获取HTML</button>
      <button id="saveJsBtn" class="btn btn-secondary">📜 只获取JS</button>
      <button id="saveCssBtn" class="btn btn-secondary">🎨 只获取CSS</button>
      <button id="manageResourcesBtn" class="btn btn-secondary">📦 查看页面资源</button>
    </div>
  </div>

  <div class="content">
    <div class="status-bar">
      <span id="statusIndicator" class="indicator"></span>
      <span id="statusText">未在 DeepSeek 页面</span>
    </div>

    <div class="section-title">
      <div class="select-all-checkbox" id="selectAllCheckbox" title="点击切换全选/取消全选">
        <input type="checkbox" id="selectAllInput">
        <span class="checkbox-icon"></span>
        <span class="select-all-text">全选</span>
      </div>
      📄 已保存的文件
      <span id="fileCount" class="count">0</span>
    </div>
    <div id="fileList" class="file-list">
      <!-- 文件列表将在这里动态生成 -->
    </div>
  </div>

  <div class="footer-actions">
    <div class="left">
      <button id="downloadSelectedBtn" class="btn btn-info">📥 下载选中</button>
      <button id="deleteSelectedBtn" class="btn btn-danger">🗑️ 删除选中</button>
    </div>
    <div class="right">
      <button id="uploadSelectedBtn" class="btn btn-success" disabled>
        📤 上传到 DeepSeek
      </button>
    </div>
  </div>

  <div id="progressOverlay" class="progress-overlay">
    <div class="progress-box">
      <h3>正在上传...</h3>
      <div class="progress-bar">
        <div id="progressFill" class="progress-fill"></div>
      </div>
      <div id="progressText" class="progress-text">准备中...</div>
    </div>
  </div>

  <!-- 1. 基础工具 -->
  <script src="../../src/utils/logger.js"></script>
  <script src="../../src/utils/constants.js"></script>
  <script src="../../src/utils/shared-utils.js"></script>
  <script src="../../src/utils/common-utils.js"></script>

  <!-- 2. 自定义模块，按依赖顺序 -->
  <script src="modules/utils.js"></script>
  <script src="modules/file-list.js"></script>
  <script src="modules/save-handlers.js"></script>
  <script src="modules/upload-handler.js"></script>

  <!-- 3. 主入口 -->
  <script src="popup.js"></script>
</body>
</html>
