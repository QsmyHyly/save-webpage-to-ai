<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>保存网页并发送给deepseek或千问</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
      <h1>📄 保存网页并发送给deepseek或千问</h1>
      <button id="settingsBtn" class="btn btn-secondary" style="padding: 8px 16px; font-size: 14px; background: rgba(255,255,255,0.3);">⚙️ 屏蔽设置</button>
    </div>
    <div class="header-actions">
      <button id="saveCurrentBtn" class="btn btn-primary">💾 保存当前页面</button>
      <button id="saveHtmlBtn" class="btn btn-secondary">📄 只获取HTML</button>
      <button id="saveJsBtn" class="btn btn-secondary">📜 只获取JS</button>
      <button id="saveCssBtn" class="btn btn-secondary">🎨 只获取CSS</button>
      <button id="saveAllResourcesBtn" class="btn btn-secondary">📦 获取所有资源</button>
      <button id="manageResourcesBtn" class="btn btn-secondary">📦 管理外部资源</button>
      <button id="selectAllBtn" class="btn btn-secondary">全选</button>
      <button id="deselectAllBtn" class="btn btn-secondary">取消全选</button>
    </div>
  </div>

  <div class="content">
    <div class="status-bar">
      <span id="statusIndicator" class="indicator"></span>
      <span id="statusText">未在 DeepSeek 页面</span>
    </div>

    <div class="section-title">
      📄 已保存的页面
      <span id="pageCount" class="count">0</span>
    </div>
    <div id="pageList" class="page-list">
      <!-- 页面列表将在这里动态生成 -->
    </div>

    <div class="section-title">
      📦 已保存的资源
      <span id="resourceCount" class="count">0</span>
    </div>
    <div id="resourceList" class="resource-list">
      <!-- 资源列表将在这里动态生成 -->
    </div>
  </div>

  <div class="footer-actions">
    <div class="left">
      <button id="downloadSelectedBtn" class="btn btn-info">📥 下载选中</button>
      <button id="deleteSelectedBtn" class="btn btn-danger">🗑️ 删除选中</button>
    </div>
    <div class="right">
      <button id="uploadSelectedBtn" class="btn btn-success" disabled>
        📤 上传到 DeepSeek
      </button>
    </div>
  </div>

  <div id="progressOverlay" class="progress-overlay">
    <div class="progress-box">
      <h3>正在上传...</h3>
      <div class="progress-bar">
        <div id="progressFill" class="progress-fill"></div>
      </div>
      <div id="progressText" class="progress-text">准备中...</div>
    </div>
  </div>

  <!-- 1. 基础工具 -->
  <script src="../../src/utils/logger.js"></script>
  <script src="../../src/utils/constants.js"></script>
  <script src="../../src/utils/shared-utils.js"></script>
  <script src="../../src/utils/common-utils.js"></script>

  <!-- 2. 规则引擎依赖 -->
  <script src="../../src/rules/rule-types.js"></script>
  <script src="../../src/rules/rule-matcher.js"></script>
  <script src="../../src/rules/rule-engine.js"></script>

  <!-- 3. HTML清理器（依赖规则引擎） -->
  <script src="../../src/utils/html-cleaner.js"></script>

  <!-- 4. 主逻辑 -->
  <script src="popup.js"></script>
</body>
</html>
