<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>扩展选项</title>
  <link rel="stylesheet" href="../common.css">
  <style>
    .container { max-width: 600px; margin: 20px auto; padding: 20px; }
    .note { color: var(--text-muted, #666); font-size: 12px; margin-top: 5px; }
    button { margin-top: 15px; margin-right: 10px; }
    .section { margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px solid var(--border-color, #eee); }
    .section h3 { margin-bottom: 10px; }
    .color-row { display: flex; align-items: center; margin-bottom: 8px; }
    .color-row label { width: 80px; }
    .color-row input[type="color"] { width: 60px; height: 30px; border: none; cursor: pointer; }
    #customColorsPanel { margin-top: 15px; padding: 15px; background: var(--bg-light, #f9f9f9); border-radius: 5px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>高级设置</h1>
    
    <div class="section">
      <h3>主题设置</h3>
      <div style="margin-bottom: 10px;">
        <label>主题模式：</label>
        <select id="themeMode">
          <option value="light">亮色</option>
          <option value="dark">深色</option>
          <option value="custom">自定义</option>
        </select>
      </div>
      <div id="customColorsPanel">
        <h4>自定义颜色</h4>
        <div class="color-row">
          <label>主色：</label>
          <input type="color" id="primaryColor" value="#667eea">
        </div>
        <div class="color-row">
          <label>主色暗：</label>
          <input type="color" id="primaryDark" value="#5568d3">
        </div>
        <div class="color-row">
          <label>危险色：</label>
          <input type="color" id="dangerColor" value="#dc3545">
        </div>
        <div class="color-row">
          <label>成功色：</label>
          <input type="color" id="successColor" value="#28a745">
        </div>
        <div class="color-row">
          <label>信息色：</label>
          <input type="color" id="infoColor" value="#17a2b8">
        </div>
        <div class="color-row">
          <label>渐变起始：</label>
          <input type="color" id="gradientStart" value="#667eea">
        </div>
        <div class="color-row">
          <label>渐变结束：</label>
          <input type="color" id="gradientEnd" value="#764ba2">
        </div>
        <div class="color-row">
          <label>背景色：</label>
          <input type="color" id="bgColor" value="#f5f7fa">
        </div>
        <div class="color-row">
          <label>背景白：</label>
          <input type="color" id="bgWhite" value="#fff">
        </div>
        <div class="color-row">
          <label>背景浅：</label>
          <input type="color" id="bgLight" value="#fafafa">
        </div>
        <div class="color-row">
          <label>背景悬停：</label>
          <input type="color" id="bgHover" value="#f8f9fa">
        </div>
        <div class="color-row">
          <label>文本主色：</label>
          <input type="color" id="textColor" value="#333">
        </div>
        <div class="color-row">
          <label>文本浅色：</label>
          <input type="color" id="textLight" value="#666">
        </div>
        <div class="color-row">
          <label>文本更浅：</label>
          <input type="color" id="textLighter" value="#888">
        </div>
        <div class="color-row">
          <label>文本禁用：</label>
          <input type="color" id="textMuted" value="#999">
        </div>
      </div>
      <button id="saveTheme">保存主题</button>
      <button id="resetTheme">重置默认</button>
    </div>

    <div class="section">
      <h3>Debugger 模式</h3>
      <label>
        <input type="checkbox" id="enableDebugger">
        使用 debugger 模式获取完整页面内容（包括封闭的 Shadow DOM）
      </label>
      <p class="note">注意：启用后保存页面时会弹出调试提示框，需用户允许。</p>
      <button id="saveDebugger">保存设置</button>
      <div id="status" style="margin-top:10px; color:var(--success-color, green);"></div>
    </div>
  </div>
  <script src="../../src/utils/logger.js"></script>
  <script src="../../src/utils/constants.js"></script>
  <script src="options.js"></script>
</body>
</html>
