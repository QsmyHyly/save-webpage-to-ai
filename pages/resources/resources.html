<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>外部资源管理</title>
  <link rel="stylesheet" href="resources.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📦 外部资源管理</h1>
    </div>
    
    <div id="resourcesList" class="resources-list">
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
        <p>正在加载资源...</p>
      </div>
    </div>
    
    <div class="action-bar">
      <button id="selectAllBtn" class="btn btn-secondary">全选</button>
      <button id="deselectAllBtn" class="btn btn-secondary">取消全选</button>
      <button id="saveSelectedBtn" class="btn btn-primary" disabled>💾 保存选中的资源</button>
    </div>
  </div>
  
  <div id="progressOverlay" class="progress-overlay">
    <div class="progress-box">
      <h3 id="progressText">正在下载资源...</h3>
      <div class="progress-bar">
        <div id="progressFill" class="progress-fill" style="width: 0%"></div>
      </div>
    </div>
  </div>
  
  <!-- 1. 基础工具 -->
  <script src="../../src/utils/logger.js"></script>
  <script src="../../src/utils/constants.js"></script>
  <script src="../../src/utils/shared-utils.js"></script>
  <script src="../../src/utils/common-utils.js"></script>

  <!-- 2. 主逻辑 -->
  <script src="resources.js"></script>
</body>
</html>
