<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>外部资源管理</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
      background: #f5f5f5;
      min-height: 100vh;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 24px;
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid #e0e0e0;
    }
    
    .header h1 {
      font-size: 24px;
      color: #333;
    }
    
    .page-selector {
      margin-bottom: 20px;
    }
    
    .page-selector label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #333;
    }
    
    .page-selector select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      background: white;
    }
    
    .resources-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .resource-item {
      display: flex;
      align-items: center;
      padding: 16px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      background: #fafafa;
      transition: all 0.2s;
    }
    
    .resource-item:hover {
      background: #f0f0f0;
      border-color: #ccc;
    }
    
    .resource-checkbox {
      width: 20px;
      height: 20px;
      margin-right: 16px;
      cursor: pointer;
    }
    
    .resource-icon {
      width: 40px;
      height: 40px;
      margin-right: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      font-size: 20px;
    }
    
    .resource-icon.css { background: #e3f2fd; color: #1976d2; }
    .resource-icon.js { background: #fff3e0; color: #f57c00; }
    .resource-icon.image { background: #e8f5e9; color: #388e3c; }
    .resource-icon.font { background: #f3e5f5; color: #7b1fa2; }
    .resource-icon.other { background: #eceff1; color: #607d8b; }
    
    .resource-info {
      flex: 1;
      min-width: 0;
    }
    
    .resource-url {
      font-size: 14px;
      color: #333;
      margin-bottom: 4px;
      word-break: break-all;
    }
    
    .resource-meta {
      font-size: 12px;
      color: #666;
    }
    
    .resource-status {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }
    
    .resource-status.saved {
      background: #e8f5e9;
      color: #2e7d32;
    }
    
    .resource-status.unsaved {
      background: #fff3e0;
      color: #e65100;
    }
    
    .resource-actions {
      display: flex;
      gap: 8px;
    }
    
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s;
    }
    
    .btn-primary {
      background: #2196f3;
      color: white;
    }
    
    .btn-primary:hover:not(:disabled) {
      background: #1976d2;
    }
    
    .btn-secondary {
      background: #757575;
      color: white;
    }
    
    .btn-secondary:hover {
      background: #616161;
    }
    
    .btn-danger {
      background: #f44336;
      color: white;
    }
    
    .btn-danger:hover {
      background: #d32f2f;
    }
    
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .action-bar {
      position: sticky;
      bottom: 0;
      background: white;
      padding: 16px 0;
      border-top: 1px solid #e0e0e0;
      margin-top: 20px;
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }
    
    .empty-state svg {
      width: 80px;
      height: 80px;
      margin-bottom: 16px;
      opacity: 0.5;
    }
    
    .progress-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    
    .progress-overlay.active {
      display: flex;
    }
    
    .progress-box {
      background: white;
      padding: 24px;
      border-radius: 8px;
      min-width: 300px;
    }
    
    .progress-box h3 {
      font-size: 16px;
      margin-bottom: 12px;
      color: #333;
    }
    
    .progress-bar {
      height: 8px;
      background: #e0e0e0;
      border-radius: 4px;
      overflow: hidden;
      margin-top: 12px;
    }
    
    .progress-fill {
      height: 100%;
      background: #2196f3;
      transition: width 0.3s;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📦 外部资源管理</h1>
    </div>
    
    <div id="resourcesList" class="resources-list">
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
        <p>正在加载资源...</p>
      </div>
    </div>
    
    <div class="action-bar">
      <button id="selectAllBtn" class="btn btn-secondary">全选</button>
      <button id="deselectAllBtn" class="btn btn-secondary">取消全选</button>
      <button id="saveSelectedBtn" class="btn btn-primary" disabled>💾 保存选中的资源</button>
    </div>
  </div>
  
  <div id="progressOverlay" class="progress-overlay">
    <div class="progress-box">
      <h3 id="progressText">正在下载资源...</h3>
      <div class="progress-bar">
        <div id="progressFill" class="progress-fill" style="width: 0%"></div>
      </div>
    </div>
  </div>
  
  <script src="resources.js"></script>
</body>
</html>
